definitions:
  domain.CreatedBy:
    properties:
      id:
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      username:
        example: admin.smart
        type: string
    required:
    - id
    - username
    type: object
  domain.EventType:
    properties:
      code:
        example: "0001"
        type: string
      created_at:
        example: "2026-04-21 09:50:04"
        type: string
      created_by:
        $ref: '#/definitions/domain.CreatedBy'
      description:
        example: TIPO DE EVENTO
        type: string
      enable:
        example: true
        type: boolean
      id:
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
    required:
    - code
    - created_by
    - description
    - id
    type: object
  domain.PaginationResults:
    properties:
      current_page:
        type: integer
      from:
        type: integer
      last_page:
        type: integer
      size_page:
        type: integer
      to:
        type: integer
      total:
        type: integer
    required:
    - current_page
    - last_page
    - size_page
    - total
    type: object
  errorDomain.LayerErr:
    enum:
    - domain
    - infrastructure
    - interface
    - use_case
    type: string
    x-enum-varnames:
    - Domain
    - Infra
    - Interface
    - UseCase
  errorDomain.LevelErr:
    enum:
    - info
    - warning
    - error
    - fatal
    type: string
    x-enum-varnames:
    - LevelInfo
    - LevelWarning
    - LevelError
    - LevelFatal
  errorDomain.SmartError:
    properties:
      code:
        type: string
      description:
        type: string
      error: {}
      function:
        type: string
      httpStatus:
        type: integer
      layer:
        $ref: '#/definitions/errorDomain.LayerErr'
      level:
        $ref: '#/definitions/errorDomain.LevelErr'
      messages:
        items:
          type: string
        type: array
      raw:
        type: string
    type: object
  httpResponse.IdResult:
    properties:
      data:
        example: "201"
        type: string
      status:
        type: integer
    required:
    - data
    - status
    type: object
  rest.createEventTypeValidated:
    properties:
      code:
        example: "0001"
        type: string
      description:
        example: TIPO DE EVENTO
        type: string
      enable:
        example: true
        type: boolean
    required:
    - code
    - description
    type: object
  rest.eventTypeByIdResult:
    properties:
      data:
        $ref: '#/definitions/domain.EventType'
      status:
        type: integer
    required:
    - status
    type: object
  rest.eventTypesResult:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.EventType'
        type: array
      pagination:
        $ref: '#/definitions/domain.PaginationResults'
      status:
        type: integer
    required:
    - pagination
    - status
    type: object
  rest.updateEventTypeValidated:
    properties:
      code:
        example: "0001"
        type: string
      description:
        example: TIPO DE EVENTO
        type: string
      enable:
        example: true
        type: boolean
    required:
    - code
    - description
    type: object
info:
  contact: {}
paths:
  /api/v1/event/event-types:
    get:
      consumes:
      - application/json
      description: Get event types
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Size page
        in: query
        name: size_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/rest.eventTypesResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Get event types
      tags:
      - EventTypes
    post:
      consumes:
      - application/json
      description: Create event type
      parameters:
      - description: Create event type body
        in: body
        name: createEventTypeBody
        required: true
        schema:
          $ref: '#/definitions/rest.createEventTypeValidated'
      produces:
      - application/json
      responses:
        "201":
          description: Success Request
          schema:
            $ref: '#/definitions/httpResponse.IdResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Create event type
      tags:
      - EventTypes
  /api/v1/event/event-types/{eventTypeId}:
    delete:
      consumes:
      - application/json
      description: Delete event type (soft delete)
      parameters:
      - description: the id of the event type
        in: path
        name: eventTypeId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/httpResponse.IdResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Delete event type
      tags:
      - EventTypes
    get:
      consumes:
      - application/json
      description: Get event type by id
      parameters:
      - description: the id of the event type
        in: path
        name: eventTypeId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/rest.eventTypeByIdResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Get event type by id
      tags:
      - EventTypes
    put:
      consumes:
      - application/json
      description: Update event type
      parameters:
      - description: the id of the event type
        in: path
        name: eventTypeId
        required: true
        type: string
      - description: Update event type body
        in: body
        name: updateEventTypeBody
        required: true
        schema:
          $ref: '#/definitions/rest.updateEventTypeValidated'
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/httpResponse.IdResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Update event type
      tags:
      - EventTypes
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
