      code:
        description: 'Description: the code of the merchant'
        example: "123456789"
        type: string
      description:
        description: 'Description: the description of the merchant'
        example: Proveedor de servicios de mantenimiento
        type: string
      document:
        description: 'Description: the document of the merchant'
        example: "123456789"
        type: string
      enable:
        description: The status enable of the merchant
        example: true
        type: boolean
      industry:
        description: 'Description: the industry of the merchant'
        example: Mantenimiento
        type: string
      name:
        description: 'Description: the name of the merchant'
        example: Odin Corp
        type: string
      phone:
        description: 'Description: the phone of the merchant'
        example: "+1234567890"
        type: string
    required:
    - address
    - code
    - description
    - document
    - enable
    - industry
    - name
    type: object
  errorDomain.LayerErr:
    enum:
