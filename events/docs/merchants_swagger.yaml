info:
  contact: {}
paths:
  /api/v1/core/merchants:
    get:
      consumes:
      - application/json
      description: Get merchant
      parameters:
      - description: the status of the merchant
        in: query
        name: status
        type: string
      - description: the name or document of the merchant
        in: query
        name: name_or_document
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/rest.merchantsResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Get merchants
      tags:
      - Merchants
    post:
      consumes:
      - application/json
      description: Create merchant
      parameters:
      - description: Create merchant body
        in: body
        name: createMerchantBody
        required: true
        schema:
          $ref: '#/definitions/domain.CreateMerchantBody'
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/httpResponse.IdResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Create merchant
      tags:
      - Merchants
  /api/v1/core/merchants/{merchantId}:
    delete:
      consumes:
      - application/json
      description: Delete merchant
      parameters:
      - description: merchant id
        in: path
        name: merchantId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/rest.deleteMerchantsResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Delete a merchant
      tags:
      - Merchants
    put:
      consumes:
      - application/json
      description: Update merchant
      parameters:
      - description: merchant id
        in: path
        name: merchantId
        required: true
        type: string
      - description: Update merchant body
        in: body
        name: updateMerchantBody
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateMerchantBody'
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/httpResponse.StatusResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Update merchant
      tags:
      - Merchants
  /api/v1/core/merchants/{merchantId}/enable:
    put:
      consumes:
      - application/json
      description: Enable or disable merchant
      parameters:
      - description: merchant id
        in: path
        name: merchantId
        required: true
        type: string
      - description: Enable or Disable merchant body
        in: body
        name: enableDisableMerchantBody
        required: true
        schema:
          $ref: '#/definitions/domain.EnableDisableMerchantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/httpResponse.StatusResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Enable or disable merchant
      tags:
      - Merchants
  /api/v1/core/merchants/{merchantId}/roles:
    get:
      consumes:
      - application/json
      description: Get roles by merchant
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/rest.rolesResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Get roles by merchant
      tags:
      - Merchants
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
