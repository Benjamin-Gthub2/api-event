    - document
    - id
    - names
    - surname
    - type_document
    - user
    type: object
  domain.Registration:
    properties:
      beneficiary:
        $ref: '#/definitions/domain.Beneficiary'
      created_at:
        description: 'Description: The date of the creation of the registration.'
        example: "2023-11-10 08:10:00"
        type: string
      created_by:
        $ref: '#/definitions/domain.CreatedBy'
      id:
        description: 'Description: The id of registration.'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      session:
        $ref: '#/definitions/domain.Session'
