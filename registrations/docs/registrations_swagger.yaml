    required:
    - code
    - description
    - id
    type: object
  domain.TypeUserCreatedBy:
    properties:
      code:
        description: 'Description: the code of type user'
        example: "1234"
        type: string
      created_at:
        description: 'Description: the date of creation'
        example: "2023-11-10 08:10:00"
        type: string
      description:
        description: 'Description: the description of type user'
        example: This is a description
