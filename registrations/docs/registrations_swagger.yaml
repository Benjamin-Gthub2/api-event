        description: 'Description: the id of creator'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      last_name:
        description: 'Description: the last names of creator'
        example: Gthub2
        type: string
      names:
        description: 'Description: the names of creator'
        example: Alexander
        type: string
      surname:
        description: 'Description: the names of creator'
        example: Leon
        type: string
      type_document:
        $ref: '#/definitions/domain.TypeDocumentCreatedBy'
      user:
        $ref: '#/definitions/domain.UserCreatedBy'
