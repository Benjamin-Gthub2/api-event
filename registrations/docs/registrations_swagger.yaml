  domain.User:
    properties:
      id:
        description: 'Description: the id of user'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      type_user:
        $ref: '#/definitions/domain.TypeUser'
      username:
        description: 'Description: the username'
        example: admin.smart
        type: string
    required:
    - id
    - type_user
    - username
    type: object
  domain.UserCreatedBy:
    properties:
      id:
        description: 'Description: the id of user'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      type_user:
        $ref: '#/definitions/domain.TypeUserCreatedBy'
      username:
        description: 'Description: the username'
        example: admin.smart
        type: string
    required:
    - id
    - type_user
    - username
    type: object
  domain.WorkShop:
    properties:
      id:
        description: 'Description: the id of workshop.'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      name:
        description: 'Description: the name of workshop.'
        example: FIRST WORKSHOP
        type: string
    required:
    - id
    - name
    type: object
  errorDomain.LayerErr:
    enum:
    - domain
    - infrastructure
    - interface
    - use_case
    type: string
    x-enum-varnames:
    - Domain
    - Infra
    - Interface
    - UseCase
  errorDomain.LevelErr:
    enum:
    - info
    - warning
    - error
    - fatal
    type: string
    x-enum-varnames:
    - LevelInfo
    - LevelWarning
    - LevelError
    - LevelFatal
  errorDomain.SmartError:
    properties:
      code:
        type: string
      description:
        type: string
      error: {}
      function:
        type: string
      httpStatus:
        type: integer
      layer:
        $ref: '#/definitions/errorDomain.LayerErr'
      level:
        $ref: '#/definitions/errorDomain.LevelErr'
      messages:
        items:
          type: string
        type: array
      raw:
        type: string
    type: object
  rest.registrationByIdResult:
    properties:
      data:
        $ref: '#/definitions/domain.Registration'
      status:
        type: integer
    required:
    - status
    type: object
info:
  contact: {}
paths:
  /api/v1/event/registrations/{registrationId}:
    get:
      consumes:
      - application/json
      description: Get registration by id
      parameters:
      - description: the id of the registration
        in: query
        name: registrationId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success Request
          schema:
            $ref: '#/definitions/rest.registrationByIdResult'
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Get registration by id
      tags:
      - Registrations
  /api/v1/event/registrations/{registrationId}/qr:
    get:
      consumes:
      - application/json
      description: Get qr registration by id
      parameters:
      - description: the id of the registration
        in: query
        name: registrationId
        type: string
      produces:
      - image/png
      responses:
        "200":
          description: Success Request
          schema:
            type: string
        "500":
          description: Bad Request
          schema:
            $ref: '#/definitions/errorDomain.SmartError'
      security:
      - BearerAuth: []
      summary: Get qr registration by id
      tags:
      - Registrations
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
