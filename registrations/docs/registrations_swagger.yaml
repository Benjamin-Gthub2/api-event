        example: "73213212"
        type: string
      id:
        description: 'Description: the id of beneficiary'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      last_name:
        description: 'Description: the last names of beneficiary'
        example: Gthub2
        type: string
      names:
        description: 'Description: the names of beneficiary'
        example: Alexander
        type: string
      surname:
        description: 'Description: the names of beneficiary'
        example: Leon
        type: string
      type_document:
        $ref: '#/definitions/domain.TypeDocument'
      user:
        $ref: '#/definitions/domain.User'
