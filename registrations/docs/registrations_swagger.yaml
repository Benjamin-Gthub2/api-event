        example: Register Document Identify
        type: string
      enable:
        description: 'Description: the enable of type document'
        example: "true"
        type: string
      id:
        description: 'Description: the id of type document'
        example: "1"
        type: string
    required:
    - abbreviated_description
    - description
    - enable
    - id
    type: object
  domain.TypeDocumentCreatedBy:
    properties:
      abbreviated_description:
        description: 'Description: the abbreviated description'
        example: DNI
        type: string
      description:
        description: 'Description: the description of type document'
        example: Register Document Identify
        type: string
      enable:
        description: 'Description: the enable of type document'
