  domain.Session:
    properties:
      created_at:
        description: 'Description: the date of creation'
        example: "2023-11-10 08:10:00"
        type: string
      end_date:
        description: 'Description: the end date'
        example: "2023-11-10 08:10:00"
        type: string
      id:
        description: 'Description: the id of session.'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
        type: string
      start_date:
        description: 'Description: the start date'
        example: "2023-11-10 08:10:00"
        type: string
