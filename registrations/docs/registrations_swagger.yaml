      created_at:
        description: 'Description: the date of creation'
        example: "2023-11-10 08:10:00"
        type: string
      description:
        description: 'Description: the description of type user'
        example: This is a description
        type: string
      id:
        description: 'Description: the id of type user'
        example: 739bbbc9-7e93-11ee-89fd-0242ac113422
